#HELIX editor configs by ShadowTheCookie


theme = "cookiestheme"

[editor]
mouse = false
default-yank-register = "+"
middle-click-paste = false
cursorline = true
popup-border = 'all'

[editor.statusline]
left = ["file-name"]
center = ["mode"]
right = ["diagnostics", "selections", "position", "file-encoding", "file-line-ending", "file-type"]
separator = "│"
mode.normal = "NORMAL"



[editor.cursor-shape]
insert = 'bar'


[editor.indent-guides]
render = true

[editor.inline-diagnostics]
cursor-line = "info"
other-lines = "error"      

[editor.gutters]
layout = ["line-numbers", "spacer", "diff"]

[keys.insert]
j = {k = "normal_mode"}

